name: Sync to GitLab

on:
  push:
    branches:
      - main
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug environment
        run: |
          echo "🔍 Checking variables..."

          if [ -z "$G_TOKEN" ]; then
            echo "❌ G_TOKEN is EMPTY"
            exit 1
          else
            echo "✅ G_TOKEN is present"
            echo "🔑 Token length: ${#G_TOKEN}"
          fi
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}

      - name: Mirror to GitLab
        run: |
          set -e
          set -x

          REPO_URL="https://mishraddeepak:${G_TOKEN}@gitlab.com/ddeepakmishra5-group/ddeepakmishra5-project.git"

          git remote remove gitlab || true
          git remote add gitlab "$REPO_URL"

          git remote -v

          echo "📡 Pushing branches..."
          git push gitlab --all

          echo "🏷️ Pushing tags..."
          git push gitlab --tags

          echo "✅ Sync completed"
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
